<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achievements - Civil Create Club</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="inner-page">

  <header class="inner-topbar">
    <div class="inner-brand">
      <img src="images/logo.png" alt="logo">
      <div>
        <h2>Civil Create Club</h2>
        <p class="inner-college-name">Bhagalpur College of Engineering</p>
      </div>
    </div>

    <nav class="inner-page-nav">
      <a href="index.html">Home</a>
      <a href="notes.html">Notes</a>
      <a href="events.html">Events</a>
      <a href="gallery.html" class="active">Achievements</a>
    </nav>
  </header>

  <main class="inner-container">
    <section class="inner-hero-card">
      <span class="section-tag">Club Highlights</span>
      <h1>Achievements & Gallery</h1>
      <p>
        Explore certificates, awards, event images, and milestone moments from
        the Civil Create Club journey.
      </p>
    </section>

    <section class="premium-card fade-up">
      <div class="section-head">
        <div>
          <span class="section-tag">Gallery</span>
          <h2>Uploaded Highlights</h2>
        </div>
      </div>

      <div id="galleryContainer" class="feature-grid">
        <div class="empty-state">
          <div class="loader"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = "https://civil-create-club.onrender.com";

    async function loadGalleryPage() {
      const box = document.getElementById("galleryContainer");

      try {
        const res = await fetch(`${API_BASE}/gallery`);
        if (!res.ok) throw new Error("Failed to load gallery");

        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
          box.innerHTML = `
            <div class="empty-state">
              <h3>No gallery items found</h3>
              <p>Images uploaded by admin will appear here.</p>
            </div>
          `;
          return;
        }

        box.innerHTML = data.map(item => `
          <div class="feature-card">
            <img 
              src="${item.image}" 
              alt="${item.title || "Gallery Image"}"
              style="width:100%; height:240px; object-fit:cover; border-radius:18px; margin-bottom:16px;"
              onerror="this.style.display='none';"
            >
            <h3>${item.title || "Gallery Image"}</h3>
            <p>${item.category || "Club Highlight"}</p>
          </div>
        `).join("");
      } catch (error) {
        console.error("Gallery load error:", error);
        box.innerHTML = `
          <div class="empty-state">
            <h3>Gallery unavailable</h3>
            <p>Please check backend connection.</p>
          </div>
        `;
      }
    }

    loadGalleryPage();
  </script>

</body>
</html>
