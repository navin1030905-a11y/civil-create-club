<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events - Civil Create Club</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="inner-page">

  <header class="inner-topbar">
    <div class="inner-brand">
      <img src="images/logo.png" alt="logo">
      <div>
        <h2>Civil Create Club</h2>
        <p class="inner-college-name">Bhagalpur College of Engineering</p>
      </div>
    </div>

    <nav class="inner-page-nav">
      <a href="index.html">Home</a>
      <a href="notes.html">Notes</a>
      <a href="events.html" class="active">Events</a>
      <a href="gallery.html">Achievements</a>
    </nav>
  </header>

  <main class="inner-container">
    <section class="inner-hero-card">
      <span class="section-tag">Club Activities</span>
      <h1>Events & Engagement</h1>
      <p>
        Explore seminars, workshops, site visits, technical competitions, and
        student development activities in one modern section.
      </p>
    </section>

    <section class="premium-card fade-up">
      <div class="section-head">
        <div>
          <span class="section-tag">Latest Updates</span>
          <h2>Event Notices</h2>
        </div>
      </div>

      <div id="eventsContainer" class="feature-grid">
        <div class="empty-state">
          <div class="loader"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = "https://civil-create-club.onrender.com";

    async function loadEvents() {
      const box = document.getElementById("eventsContainer");

      try {
        const res = await fetch(`${API_BASE}/notices`);
        if (!res.ok) throw new Error("Failed to load notices");

        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
          box.innerHTML = `
            <div class="empty-state">
              <h3>No event notices available</h3>
              <p>Fresh event updates will appear here.</p>
            </div>
          `;
          return;
        }

        box.innerHTML = data.map(item => `
          <div class="feature-card">
            <h3>${item.title || "Untitled Event"}</h3>
            <p>${item.content || "No description available."}</p>
            <p style="margin-top:12px; font-weight:600; color:#2563eb;">
              ${item.type || "update"}
            </p>
          </div>
        `).join("");
      } catch (error) {
        console.error("Events load error:", error);
        box.innerHTML = `
          <div class="empty-state">
            <h3>Events unavailable</h3>
            <p>Please check backend connection.</p>
          </div>
        `;
      }
    }

    loadEvents();
  </script>

</body>
</html>
