<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes - Civil Create Club</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="inner-page">

  <header class="inner-topbar">
    <div class="inner-brand">
      <img src="images/logo.png" alt="logo">
      <div>
        <h2>Civil Create Club</h2>
        <p class="inner-college-name">Bhagalpur College of Engineering</p>
      </div>
    </div>

    <nav class="inner-page-nav">
      <a href="index.html">Home</a>
      <a href="notes.html" class="active">Notes</a>
      <a href="events.html">Events</a>
      <a href="gallery.html">Achievements</a>
    </nav>
  </header>

  <main class="inner-container">
    <section class="inner-hero-card">
      <span class="section-tag">Learning Resources</span>
      <h1>Subject Notes & Study Material</h1>
      <p>
        Organized academic notes, subject material, and optional PDF resources
        uploaded by the Civil Create Club admin team.
      </p>
    </section>

    <section class="premium-card fade-up">
      <div class="section-head">
        <div>
          <span class="section-tag">Notes</span>
          <h2>Available Study Material</h2>
        </div>
      </div>

      <div id="notesContainer" class="feature-grid">
        <div class="empty-state">
          <div class="loader"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = "https://civil-create-club.onrender.com";

    async function loadNotes() {
      const box = document.getElementById("notesContainer");

      try {
        const res = await fetch(`${API_BASE}/notes`);
        if (!res.ok) throw new Error("Failed to load notes");

        const data = await res.json();
        console.log("Notes data:", data);

        if (!Array.isArray(data) || data.length === 0) {
          box.innerHTML = `
            <div class="empty-state">
              <h3>No notes available</h3>
              <p>Notes added by admin will appear here.</p>
            </div>
          `;
          return;
        }

        box.innerHTML = data.map(item => `
          <div class="feature-card note-card">
            <h3>${item.title || "Untitled Note"}</h3>
            <p>${item.description || "No description available."}</p>

            <p style="margin-top:12px; font-weight:700; color:#2563eb;">
              ${item.subject || "General"}
            </p>

            ${
              item.pdf_link && item.pdf_link.trim() !== ""
                ? `
                  <div style="margin-top:18px;">
                    <a 
                      href="${item.pdf_link.replace('/image/upload/', '/raw/upload/')}" 
                      target="_blank" 
                      class="note-open-btn"
                      rel="noopener noreferrer"
                      style="
                        display:inline-block;
                        padding:10px 16px;
                        border-radius:12px;
                        background:linear-gradient(135deg,#2563eb,#10b981);
                        color:white;
                        font-weight:600;
                        text-decoration:none;
                      "
                    >
                      Open PDF
                    </a>
                  </div>
                `
                : `
                  <div style="margin-top:18px; color:#94a3b8; font-weight:600;">
                    PDF not available
                  </div>
                `
            }
          </div>
        `).join("");
      } catch (error) {
        console.error("Notes load error:", error);
        box.innerHTML = `
          <div class="empty-state">
            <h3>Notes unavailable</h3>
            <p>Please check backend connection.</p>
          </div>
        `;
      }
    }

    loadNotes();
  </script>

</body>
</html>
